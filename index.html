<body>

  <script>
    // 3×3 격자 탐색 — 약 220m 간격, 반경 300m
    // 위도 220m ≈ 0.00198°, 경도 220m ≈ 0.00250°
    const GRID_CENTERS = [
      [37.454112, 126.654518], // NW
      [37.454112, 126.657018], // N
      [37.454112, 126.659518], // NE
      [37.452132, 126.654518], // W
      [37.452132, 126.657018], // Center
      [37.452132, 126.659518], // E
      [37.450152, 126.654518], // SW
      [37.450152, 126.657018], // S
      [37.450152, 126.659518], // SE
    ];

    const ps = new kakao.maps.services.Places();
    const seen = new Set();
    let collected = [];
    let centerIdx = 0;

    function searchCenter(idx) {
      if (idx >= GRID_CENTERS.length) { pick(); return; }
      const [lat, lng] = GRID_CENTERS[idx];
      ps.categorySearch('FD6', makeHandler(idx), {
        location: new kakao.maps.LatLng(lat, lng),
        radius: 300,
        sort: kakao.maps.services.SortBy.DISTANCE,
        size: 15,
        page: 1,
      });
    }

    function makeHandler(idx) {
      return function(data, status, pagination) {
        if (status === kakao.maps.services.Status.OK) {
          data.forEach(function(p) {
            if (!seen.has(p.id)) {
              seen.add(p.id);
              collected.push(p);
            }
          });
          if (pagination.hasNextPage && pagination.current < 3) {
            pagination.nextPage();
          } else {
            searchCenter(idx + 1);
          }
        } else {
          searchCenter(idx + 1);
        }
      };
    }

    function pick() {
      if (collected.length === 0) { showError(); return; }
      const place = collected[Math.floor(Math.random() * collected.length)];

      const cat = (place.category_name || '').split('>').pop().trim() || '음식점';
      document.getElementById('cat').textContent = cat;
      document.getElementById('name').textContent = place.place_name;
      document.getElementById('addr').textContent = place.road_address_name || place.address_name || '';
      document.getElementById('phone').textContent = place.phone || '';
      document.getElementById('kakaoLink').href = place.place_url || '#';

      document.getElementById('loading').style.display = 'none';
      document.getElementById('card').style.display = 'block';

      // 지도
      const pos = new kakao.maps.LatLng(place.y, place.x);
      const map = new kakao.maps.Map(document.getElementById('map'), {
        center: pos,
        level: 4,
        draggable: false,
        scrollwheel: false,
      });
      new kakao.maps.Marker({ map, position: pos });
    }

    function showError() {
      document.getElementById('loading').innerHTML =
        '<p style="color:#4a5568">식당 정보를 불러오지 못했습니다.<br>잠시 후 새로고침 해주세요.</p>';
    }

    searchCenter(0);
  </script>
