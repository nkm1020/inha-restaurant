<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>인하대 후문 오늘의 식당</title>
  <script type="text/javascript"
    src="//dapi.kakao.com/v2/maps/sdk.js?appkey=66d8fdc6a4c0e504c4727460b61af4bc&libraries=services"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4483031628547482"
    crossorigin="anonymous"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', 'Noto Sans KR', sans-serif;
      background: #0f0f1a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .top-label {
      font-size: 0.85rem;
      color: #4a5568;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    /* 로딩 상태 */
    #loading {
      text-align: center;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255,255,255,0.08);
      border-top-color: #e94560;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: #4a5568; font-size: 0.9rem; }

    /* 카드 */
    #card {
      display: none;
      width: 100%;
      max-width: 480px;
      text-align: center;
      animation: fadeUp 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .category-tag {
      display: inline-block;
      font-size: 0.78rem;
      font-weight: 700;
      padding: 4px 14px;
      border-radius: 20px;
      background: linear-gradient(90deg, #e94560, #f5a623);
      color: #fff;
      margin-bottom: 16px;
      letter-spacing: 0.05em;
    }

    .restaurant-name {
      font-size: 2.8rem;
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 14px;
      word-break: keep-all;
    }

    .address {
      font-size: 0.88rem;
      color: #718096;
      margin-bottom: 6px;
      line-height: 1.5;
    }
    .phone {
      font-size: 0.85rem;
      color: #4a5568;
      margin-bottom: 28px;
    }

    /* 지도 */
    #map {
      width: 100%;
      height: 220px;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 24px;
      border: 1px solid rgba(255,255,255,0.07);
    }

    /* 버튼들 */
    .btn-row {
      display: flex;
      gap: 10px;
    }
    .btn {
      flex: 1;
      padding: 13px;
      font-size: 0.9rem;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.18s;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-primary {
      background: linear-gradient(90deg, #e94560, #f5a623);
      color: #fff;
    }
    .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(233,69,96,0.35); }
    .btn-secondary {
      background: rgba(255,255,255,0.06);
      color: #a0aec0;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.1); color: #fff; }

    .footer {
      margin-top: 16px;
      font-size: 0.72rem;
      color: #2d3748;
    }
  </style>
</head>
<body>

  <p class="top-label">🍚 인하대 후문 · 오늘의 식당</p>

  <!-- 로딩 -->
  <div id="loading">
    <div class="spinner"></div>
    <p class="loading-text">근처 식당을 불러오는 중…</p>
  </div>

  <!-- 결과 카드 -->
  <div id="card">
    <span class="category-tag" id="cat"></span>
    <div class="restaurant-name" id="name"></div>
    <div class="address" id="addr"></div>
    <div class="phone" id="phone"></div>
    <div id="map"></div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="location.reload()">🎲 다른 식당</button>
      <a class="btn btn-secondary" id="kakaoLink" href="#" target="_blank">카카오맵 →</a>
    </div>
  </div>

  <p class="footer">새로고침하면 다른 식당을 추천해드려요</p>

  <script>
    const CENTER = new kakao.maps.LatLng(37.452132, 126.657018);
    const ps = new kakao.maps.services.Places();
    let collected = [];

    function search(page) {
      ps.categorySearch('FD6', onResult, {
        location: CENTER,
        radius: 450,
        sort: kakao.maps.services.SortBy.DISTANCE,
        size: 15,
        page: page || 1,
      });
    }

    function onResult(data, status, pagination) {
      if (status !== kakao.maps.services.Status.OK) { showError(); return; }
      collected = collected.concat(data);
      if (pagination.hasNextPage && pagination.current < 3) {
        pagination.nextPage();
      } else {
        pick();
      }
    }

    function pick() {
      if (collected.length === 0) { showError(); return; }
      const place = collected[Math.floor(Math.random() * collected.length)];

      const cat = (place.category_name || '').split('>').pop().trim() || '음식점';
      document.getElementById('cat').textContent = cat;
      document.getElementById('name').textContent = place.place_name;
      document.getElementById('addr').textContent = place.road_address_name || place.address_name || '';
      document.getElementById('phone').textContent = place.phone || '';
      document.getElementById('kakaoLink').href = place.place_url || '#';

      document.getElementById('loading').style.display = 'none';
      document.getElementById('card').style.display = 'block';

      // 지도
      const pos = new kakao.maps.LatLng(place.y, place.x);
      const map = new kakao.maps.Map(document.getElementById('map'), {
        center: pos,
        level: 4,
        draggable: false,
        scrollwheel: false,
      });
      new kakao.maps.Marker({ map, position: pos });
    }

    function showError() {
      document.getElementById('loading').innerHTML =
        '<p style="color:#4a5568">식당 정보를 불러오지 못했습니다.<br>잠시 후 새로고침 해주세요.</p>';
    }

    search();
  </script>
</body>
</html>
