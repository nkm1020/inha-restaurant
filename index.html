  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Noto Sans KR', sans-serif;
      background: #0f0f1a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;

    }

    .top-label {
      font-size: 0.85rem;
      color: #4a5568;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    /* 로딩 상태 */
    #loading {
      text-align: center;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255, 255, 255, 0.08);
      border-top-color: #e94560;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;

    @keyframes spin {
      to {
        transform: rotate(360deg);

    /* 카드 */
    #card {

      animation: fadeUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(24px) scale(0.96);

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .category-tag {
      display: inline-block;
      font-size: 0.78rem;
      font-weight: 700;
      padding: 4px 14px;
      border-radius: 20px;
      background: linear-gradient(90deg, #e94560, #f5a623);
      color: #fff;
      margin-bottom: 16px;
      letter-spacing: 0.05em;
    }

    .restaurant-name {
      font-size: 2.8rem;
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 14px;
      word-break: keep-all;
    }

    .address {
      font-size: 0.88rem;
      color: #718096;

      line-height: 1.5;
    }

    .phone {
      font-size: 0.85rem;
      color: #4a5568;

    }

    /* 지도 */
    #map {
      width: 100%;
      height: 220px;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 24px;
      border: 1px solid rgba(255, 255, 255, 0.07);
    }

    /* 버튼들 */
    .btn-row {
      display: flex;
      gap: 10px;
    }

    .btn {
      flex: 1;
      padding: 13px;

      font-weight: 700;
      border: none;

      cursor: pointer;
      transition: all 0.18s;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-primary {
      background: linear-gradient(90deg, #e94560, #f5a623);
      color: #fff;
    }

    .btn-primary:hover {
      opacity: 0.88;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(233, 69, 96, 0.35);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.06);
      color: #a0aec0;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }

    .footer {
      margin-top: 16px;
      font-size: 0.72rem;
      color: #2d3748;
    }

    .site-info {
      width: 100%;
      max-width: 480px;
      margin-bottom: 28px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 14px;
      padding: 18px 20px;
      text-align: left;
    }

    .site-info h1 {
      font-size: 1rem;
      font-weight: 700;
      color: #e2e8f0;
      margin-bottom: 8px;
    }

    .site-info p {
      font-size: 0.82rem;
      color: #718096;
      line-height: 1.7;
    }

    .ad-wrap {
      width: 100%;
      max-width: 480px;
      min-height: 100px;
      margin-top: 28px;
      text-align: center;
    }

    .page-footer {
      margin-top: 24px;
      font-size: 0.72rem;
      color: #2d3748;
      text-align: center;
    }

    .page-footer a {
      color: #4a5568;
      text-decoration: none;
      border-bottom: 1px solid #2d3748;
    }

    .page-footer a:hover {
      color: #718096;
    }

    /* 토글 스위치 스타일 */
    .filter-row {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    .toggle-label {
      font-size: 0.8rem;
      color: #a0aec0;
      font-weight: 500;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 22px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(255, 255, 255, 0.1);
      transition: .3s;
      border-radius: 22px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background-color: #718096;
      transition: .3s;
      border-radius: 50%;
    }

    input:checked+.slider {
      background-color: #e94560;
    }

    input:checked+.slider:before {
      transform: translateX(18px);
      background-color: #fff;
    }
  </style>

<body>

  <p class="top-label">🍚 인하대 후문 · 오늘의 식당</p>

  <div class="site-info">
    <h1>인하대학교 후문 맛집 랜덤 추천</h1>
    <p>
      인하대학교 후문 반경 450m 이내의 식당을 랜덤으로 추천해드립니다.<br>
      오늘 점심·저녁 메뉴 고민이라면 새로고침 한 번으로 해결하세요.<br>
      카카오맵 데이터를 기반으로 실시간 주변 맛집 정보를 제공합니다.
    </p>
    <div class="filter-row">
      <span class="toggle-label">술집 포함</span>
      <label class="switch">
        <input type="checkbox" id="barToggle">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <!-- 로딩 -->
  <div id="loading">
    <div class="spinner"></div>
    <p class="loading-text">근처 식당을 불러오는 중…</p>
  </div>

  <!-- 결과 카드 -->
  <div id="card">
    <span class="category-tag" id="cat"></span>
    <div class="restaurant-name" id="name"></div>
    <div class="address" id="addr"></div>
    <div class="phone" id="phone"></div>
    <div id="map"></div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="pick()">🎲 다른 식당</button>
      <a class="btn btn-secondary" id="kakaoLink" href="#" target="_blank">카카오맵 →</a>
    </div>
  </div>

  <div class="ad-wrap">
    <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-4483031628547482" data-ad-slot="5098124133"
      data-ad-format="auto" data-full-width-responsive="true"></ins>
    <script>
      (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
  </div>

  <p class="page-footer">
    새로고침하면 다른 식당을 추천해드려요 &nbsp;·&nbsp;
    <a href="privacy.html">개인정보처리방침</a> &nbsp;·&nbsp;
    <a href="javascript:void(0)" onclick="forceRefresh()" style="color:#2d3748">목록 갱신</a>
  </p>

  <script>
    // 6×6 격자 탐색 — 범위를 세분화하여 더 많은 식당 수집
    const LAT_MIN = 37.450152, LAT_MAX = 37.454112;
    const LNG_MIN = 126.654518, LNG_MAX = 126.659518;
    const GRID_SIZE = 6;
    const GRID_CENTERS = [];

    for (let i = 0; i < GRID_SIZE; i++) {
      for (let j = 0; j < GRID_SIZE; j++) {
        const lat = LAT_MIN + (LAT_MAX - LAT_MIN) * (i / (GRID_SIZE - 1));
        const lng = LNG_MIN + (LNG_MAX - LNG_MIN) * (j / (GRID_SIZE - 1));
        GRID_CENTERS.push([lat, lng]);
      }
    }

    const barToggle = document.getElementById('barToggle');
    // 기본값: 술집 제외 (false)
    let includeBars = localStorage.getItem('includeBars') === 'true';
    barToggle.checked = includeBars;

    barToggle.addEventListener('change', function () {
      includeBars = this.checked;
      localStorage.setItem('includeBars', includeBars);
      // 이미 로딩이 완료된 상태라면 카드 갱신
      if (document.getElementById('card').style.display === 'block') {
        pick();
      }
    });

    const ps = new kakao.maps.services.Places();
    const seen = new Set();
    let collected = [];
    let pickCount = 0;

    // 캐시 설정
    const CACHE_KEY = 'inha_restaurants';
    const CACHE_TIME_KEY = 'inha_last_fetch';
    const CACHE_TTL = 7 * 24 * 60 * 60 * 1000; // 7일

    function start() {
      const cached = localStorage.getItem(CACHE_KEY);
      const lastFetch = localStorage.getItem(CACHE_TIME_KEY);
      const now = Date.now();

      if (cached && lastFetch && (now - lastFetch < CACHE_TTL)) {
        try {
          collected = JSON.parse(cached);
          if (collected.length > 0) {
            console.log('캐시된 데이터 ' + collected.length + '개 로드됨');
            pick();
            return;
          }
        } catch (e) {
          console.error('캐시 로드 실패', e);
        }
      }
      // 캐시 없거나 만료됨 -> 검색 시작
      searchCenter(0);
    }

    function forceRefresh() {
      if (!confirm('식당 목록을 새로 불러오시겠습니까?\n약 5~10초 정도 소요됩니다.')) return;
      localStorage.removeItem(CACHE_KEY);
      localStorage.removeItem(CACHE_TIME_KEY);
      location.reload(); // 강제 갱신은 단순하게 리로드로 처리
    }

    function searchCenter(idx) {
      if (idx >= GRID_CENTERS.length) {
        // 검색 완료 -> 캐시 저장 후 pick
        localStorage.setItem(CACHE_KEY, JSON.stringify(collected));
        localStorage.setItem(CACHE_TIME_KEY, Date.now().toString());
        pick();
        return;
      }
      const [lat, lng] = GRID_CENTERS[idx];
      ps.categorySearch('FD6', makeHandler(idx), {
        location: new kakao.maps.LatLng(lat, lng),
        radius: 300,
        sort: kakao.maps.services.SortBy.DISTANCE,
        size: 15,
        page: 1,
      });
    }

    function makeHandler(idx) {
      return function (data, status, pagination) {
        if (status === kakao.maps.services.Status.OK) {
          data.forEach(function (p) {
            if (!seen.has(p.id)) {
              seen.add(p.id);
              collected.push(p);
            }
          });
          if (pagination.hasNextPage && pagination.current < 3) {
            pagination.nextPage();
          } else {
            searchCenter(idx + 1);
          }
        } else {
          searchCenter(idx + 1);
        }
      };
    }

    const BAR_KEYWORDS = ['술집', '호프', '포장마차', '이자카야', '포차', '펍', '바(BAR)', '주점', '맥주집'];

    function pick() {
      if (collected.length === 0) { showError(); return; }
      pickCount++;
      if (pickCount === 10) {
        alert("왜 자꾸 새로고침해?");
      }

      // 술집 필터링
      let filtered = collected;
      if (!includeBars) {
        filtered = collected.filter(p => {
          const cat = p.category_name || '';
          return !BAR_KEYWORDS.some(k => cat.includes(k));
        });
      }

      // 만약 필터 결과가 0개라면 (그럴 리는 거의 없겠지만) 원본에서 선택
      if (filtered.length === 0) filtered = collected;

      const place = filtered[Math.floor(Math.random() * filtered.length)];

      const cat = (place.category_name || '').split('>').pop().trim() || '음식점';
      document.getElementById('cat').textContent = cat;
      document.getElementById('name').textContent = place.place_name;
      document.getElementById('addr').textContent = place.road_address_name || place.address_name || '';
      document.getElementById('phone').textContent = place.phone || '';
      document.getElementById('kakaoLink').href = place.place_url || '#';

      document.getElementById('loading').style.display = 'none';
      document.getElementById('card').style.display = 'block';

      // 지도
      const pos = new kakao.maps.LatLng(place.y, place.x);
      const map = new kakao.maps.Map(document.getElementById('map'), {
        center: pos,
        level: 4,
        draggable: false,
        scrollwheel: false,
      });
      new kakao.maps.Marker({ map, position: pos });
    }

    function showError() {
      document.getElementById('loading').innerHTML =
        '<p style="color:#4a5568">식당 정보를 불러오지 못했습니다.<br>잠시 후 새로고침 해주세요.</p>';
    }

    start();
  </script>
</body>

</html>
